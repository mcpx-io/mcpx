name: Publish mcpx CLI

on:
  push:
    tags:
      - "mcpx@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --workspace=cli/mcpx

      - name: Build
        run: npm run build --workspace=cli/mcpx

      - name: Publish to npm
        run: npm publish --workspace=cli/mcpx --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

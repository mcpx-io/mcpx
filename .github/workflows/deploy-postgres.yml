name: Deploy @mcpx/postgres

on:
  push:
    branches:
      - master
    paths:
      - "mcp/postgres/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --workspace=mcp/postgres

      - name: Build
        run: npm run build --workspace=mcp/postgres

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "mcp/postgres/dist/server.js"
          target: "/srv/mcpx.online/database-v3/"
          strip_components: 3

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: pm2 restart mcpx-postgres
